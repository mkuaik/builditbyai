<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Logo AI Color Options</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        body {
            background: #0f172a;
            /* Same as the site's dark mode navbar/footer */
            color: #ffffff;
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding: 50px;
            margin: 0;
        }

        .option-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 60px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
        }

        .title {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 20px;
            font-weight: 400;
            font-family: inherit;
        }

        .logo-preview {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0px;
        }

        /* Basic Accent */
        .accent {
            color: #f97316;
            /* Orange */
        }

        /* Gradient Accent */
        .grad {
            background: linear-gradient(135deg, #f97316, #fcd34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tech Blue Accent */
        .blue {
            color: #38bdf8;
        }
    </style>
</head>

<body>

    <div class="option-container">
        <div class="title">الحالي: تلوين (It) فقط</div>
        <div class="logo-preview">Build<span class="accent">It</span>ByAI</div>
    </div>

    <div class="option-container">
        <div class="title">الخيار 1: تلوين (AI) فقط</div>
        <div class="logo-preview">BuildItBy<span class="accent">AI</span></div>
    </div>

    <div class="option-container">
        <div class="title">الخيار 2: تلوين (It) و (AI) بالبرتقالي</div>
        <div class="logo-preview">Build<span class="accent">It</span>By<span class="accent">AI</span></div>
    </div>

    <div class="option-container">
        <div class="title">الخيار 3: (It) برتقالي، و (AI) بتدرج ذهبي ساحر</div>
        <div class="logo-preview">Build<span class="accent">It</span>By<span class="grad">AI</span></div>
    </div>

    <div class="option-container">
        <div class="title">الخيار 4: (It) برتقالي، و (AI) أزرق تقني</div>
        <div class="logo-preview">Build<span class="accent">It</span>By<span class="blue">AI</span></div>
    </div>

</body>

</html>
